name: Deploy to FTP Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Création du fichier secrets.ts pour le build
      - name: Create secrets.ts
        run: |
          echo "export const SUPABASE_URL = '${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}'" > secrets.ts
          echo "export const SUPABASE_ANON_KEY = '${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}'" >> secrets.ts

      # 6. Run TypeScript check
      - name: Run TypeScript check
        run: pnpm run type-check

      # 7. Build Next.js project
      - name: Build Next.js project (Export)
        run: pnpm run build

      # 8. Deploy to FTP
      - name: Deploy to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./out/
          server-dir: /
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
